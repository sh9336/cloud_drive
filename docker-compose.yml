# docker-compose.yml

services:
  postgres:
    image: postgres:15-alpine
    container_name: file-storage-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: file_storage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file-storage-network

  minio:
    image: minio/minio:latest
    container_name: file-storage-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file-storage-network

  # MinIO bucket setup
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/file-storage-bucket --ignore-existing;
      mc anonymous set none myminio/file-storage-bucket;
      echo 'MinIO bucket created successfully';
      "
    networks:
      - file-storage-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-storage-backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.dev
    ports:
      - "8082:8080"  # HOST:CONTAINER - exposes port 8082 on your machine
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file-storage-network

networks:
  file-storage-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: